<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authenticating...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      color: white;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
    }

    p {
      margin: 0;
      font-size: 16px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Completing sign in...</h1>
    <p>Please wait while we authenticate you.</p>
  </div>

  <script>
    console.log("🔐 OAuth Callback HTML Loaded");
    console.log("URL:", window.location.href);
    console.log("Hash:", window.location.hash);
    console.log("Search:", window.location.search);

    // Fix malformed URL with double question marks
    if (window.location.href.includes('??')) {
      console.log("🔧 Fixing malformed URL with double question marks");
      const fixedUrl = window.location.href.replace('??', '?');
      console.log("🔧 Fixed URL:", fixedUrl);
      window.history.replaceState({}, '', fixedUrl);
    }

    // Redirect to React app's callback route with all params intact
    const hash = window.location.hash;
    const search = window.location.search;

    if (hash || search) {
      console.log("✅ OAuth data found, redirecting to React app");

      // Build redirect URL preserving both hash and search params
      let redirectUrl = '/auth/callback';
      if (search) redirectUrl += search;
      if (hash) redirectUrl += hash;

      console.log("🔄 Redirecting to:", redirectUrl);

      setTimeout(() => {
        window.location.href = redirectUrl;
      }, 100);
    } else {
      console.warn("⚠️ No OAuth data found, redirecting to home");
      setTimeout(() => {
        window.location.href = "/";
      }, 1000);
    }

    // Timeout fallback
    setTimeout(() => {
      if (window.location.pathname.includes('/auth/callback')) {
        console.error("❌ OAuth callback timeout, redirecting to home");
        window.location.href = "/";
      }
    }, 5000);
  </script>
</body>

</html>
